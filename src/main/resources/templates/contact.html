<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::#content}, ~{::title})}">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>

<body>
    <section id="content" class="pt-24 md:pt-32 min-h-screen bg-gray-950 px-6 py-20">

        <div class="max-w-6xl mx-auto">

            <!-- Heading -->
            <div class="text-center">

                <h1 class="text-5xl font-bold text-white">
                    Contact Us
                </h1>

                <p class="mt-4 text-gray-400">
                    Have questions? We'd love to hear from you.
                </p>

            </div>

            <!-- Content -->
            <div class="grid lg:grid-cols-2 gap-10 mt-16">

                <!-- Contact Form -->
                <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">

                    <h2 class="text-2xl font-semibold text-white mb-6">
                        Send Message
                    </h2>

                    <form class="space-y-5">

                        <input type="text" placeholder="Your Name"
                            class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500">

                        <input type="email" placeholder="Your Email"
                            class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500">

                        <input type="text" placeholder="Subject"
                            class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500">

                        <textarea rows="5" placeholder="Your Message"
                            class="w-full bg-gray-950 border border-gray-700 rounded-xl px-4 py-3 text-white outline-none focus:border-blue-500 resize-none"></textarea>

                        <button type="submit"
                            class="w-full bg-blue-500 hover:bg-blue-600 text-white py-3 rounded-xl font-medium transition">

                            Send Message

                        </button>

                    </form>

                </div>

                <!-- Contact Information -->
                <div class="bg-gray-900 border border-gray-800 rounded-3xl p-8">

                    <h2 class="text-2xl font-semibold text-white mb-6">
                        Contact Information
                    </h2>

                    <div class="space-y-6">

                        <div class="bg-gray-950 border border-gray-800 rounded-2xl p-5">

                            <h3 class="text-blue-400 font-medium">
                                📧 Email
                            </h3>

                            <p class="text-gray-300 mt-2">
                                support@smartcontactmanager.com
                            </p>

                        </div>

                        <div class="bg-gray-950 border border-gray-800 rounded-2xl p-5">

                            <h3 class="text-blue-400 font-medium">
                                📱 Phone
                            </h3>

                            <p class="text-gray-300 mt-2">
                                +91 9876543210
                            </p>

                        </div>

                        <div class="bg-gray-950 border border-gray-800 rounded-2xl p-5">

                            <h3 class="text-blue-400 font-medium">
                                📍 Address
                            </h3>

                            <p class="text-gray-300 mt-2">
                                Bhopal, Madhya Pradesh, India
                            </p>

                        </div>

                    </div>

                </div>

            </div>

        </div>

    </section>
</body>

</html>
