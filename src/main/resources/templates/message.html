<!-- Popup -->
<div data-th-if="${message}" id="popup" data-th-fragment="messageBox"
    class="fixed top-6 right-6 bg-gray-900 border  text-white px-5 py-2.5 rounded-2xl shadow-2xl w-[250px] md:w-[320px] hidden z-50"
    data-th-classappend="${messageType == 'green'} ? 'border-green-600' : 'border-red-600'">

    <!-- <h2 class="text-xl font-bold">
        <span data-th-if="${messageType == 'green'}" class="text-green-600">Success 🎉</span>
        <span data-th-if="${messageType == 'red'}" class="text-red-600">Error ❌</span>
    </h2> -->

    <p class="text-[12px] md:text-base mt-2 text-gray-300" data-th-text="${message}">
    </p>

    <button id="closePopup"
        class="text-[12px] md:text-base mt-5 bg-blue-500 hover:bg-blue-600 px-3 py-1 md:px-5 md:py-2 rounded-xl font-medium transition">

        OK

    </button>

</div>
