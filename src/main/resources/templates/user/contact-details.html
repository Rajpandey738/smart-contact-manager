<!DOCTYPE html>
<html lang="en" th:replace="~{base :: parent(~{::section}, ~{::title})}">

<head>
    <title>Contact Details</title>
</head>

<body>

    <section id="content" class="min-h-screen bg-gray-950 p-2 sm:p-4 lg:p-6">

        <div data-th-replace="message :: messageBox"></div>
        <div class="max-w-4xl mx-auto">

            <div class="bg-gray-900 border border-gray-800 rounded-3xl p-3 sm:p-5 lg:p-6 mt-5">
                <a href="/user/view-contacts"
                    class="text-sm sm:text-lg inline-flex items-center gap-2 text-blue-400 hover:text-blue-300 mb-6">

                    <span><i class="fa-solid fa-arrow-left-long"></i></span> Back to Contacts

                </a>
                <h1 class="text-2xl sm:text-3xl text-center sm:text-left text-white font-bold mb-6">
                    Contact Details
                </h1>

                <div class="mt-10 flex flex-col gap-8">

                    <div class="flex flex-col sm:flex-row items-center text-center sm:text-left gap-5 sm:gap-10">

                        <img src="/images/profile-placeholder.png" alt="Profile Image"
                            class="w-40 h-40 rounded-full border-4 border-gray-800">

                        <div class="flex-1">

                            <h2 class="text-xl sm:text-2xl text-white font-semibold mb-2" th:text="${contact.name}">

                            </h2>

                            <p class="text-sm sm:text-base text-gray-400 mb-4" th:text="${contact.description}">
                            </p>


                        </div>

                    </div>

                    <div class="bg-gray-950 border border-gray-800 rounded-2xl overflow-hidden">

                        <table class="w-full">

                            <tbody>

                                <tr class="border-b border-gray-800">
                                    <td class="p-4 text-gray-400 font-medium w-40 text-sm sm:text-base">
                                        Email
                                    </td>
                                    <td class="p-4 text-white break-all text-sm sm:text-base"
                                        th:text="${contact.email}">
                                    </td>
                                </tr>

                                <tr class="border-b border-gray-800">
                                    <td class="p-4 text-gray-400 font-medium text-sm sm:text-base">
                                        Phone
                                    </td>
                                    <td class="p-4 text-white text-sm sm:text-base" th:text="${contact.phoneNumber}">
                                        +91 9876543210
                                    </td>
                                </tr>

                                <tr class="border-b border-gray-800">
                                    <td class="p-4 text-gray-400 font-medium text-sm sm:text-base">
                                        Address
                                    </td>
                                    <td class="p-4 text-white text-sm sm:text-base" th:text="${contact.address}">
                                        Indore, Madhya Pradesh
                                    </td>
                                </tr>

                            </tbody>

                        </table>

                    </div>
                </div>

                <div class="flex flex-row justify-center gap-4 mt-6">

                    <a th:href="@{/user/edit-contact/{id}(id=${contact.contactId}, source='contact-details')}"
                        class="text-sm sm:text-base bg-blue-500 hover:bg-blue-600 text-center text-white py-2 px-5 rounded-xl font-medium">

                        Edit Contact

                    </a>
                    <!-- <a th:href="@{/user/delete-contact/{id}(id=${contact.contactId})}"
                        class="text-sm sm:text-base bg-red-500 hover:bg-red-600 text-white py-2 px-5 rounded-xl font-medium">

                        Delete Contact

                    </a> -->

                    <!-- Updated version -->
                    <a href="#" th:data-contact-id="${contact.contactId}"
                        class="delete-contact text-sm sm:text-base bg-red-500 hover:bg-red-600 text-white py-2 px-5 rounded-xl font-medium">

                        Delete Contact

                    </a>
                </div>

            </div>

        </div>

    </section>

</body>

</html>
